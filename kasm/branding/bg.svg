<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0a1832"/>
      <stop offset="100%" stop-color="#060b18"/>
    </radialGradient>
    <radialGradient id="accent" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <!-- Subtle accent glow -->
  <ellipse cx="960" cy="420" rx="600" ry="400" fill="url(#accent)"/>
  <!-- Grid lines (very subtle) -->
  <g stroke="#163058" stroke-opacity="0.15" stroke-width="0.5">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
  </g>
  <!-- ClawShield logo -->
  <g transform="translate(960,440)">
    <circle cx="0" cy="0" r="48" fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.4"/>
    <circle cx="0" cy="0" r="38" fill="#0d1a2f" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.6"/>
    <path d="M0 -18 L-9 0 L-5 0 L-11 18 L7 4 L2 4 L10 -12 Z" fill="#00d4ff" fill-opacity="0.8"/>
  </g>
  <!-- Title -->
  <text x="960" y="530" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="700" letter-spacing="6" fill="#00d4ff" fill-opacity="0.7">CLAWSHIELD</text>
  <text x="960" y="558" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="400" letter-spacing="3" fill="#4a7aab" fill-opacity="0.6">AI SECURITY GATEWAY</text>
</svg>
