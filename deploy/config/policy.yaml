# ClawShield Production Policy — pen-test hardened
# default: deny everything not explicitly allowed

default_action: deny

evaluation_timeout_ms: 150

max_message_bytes: 262144  # 256KB

# --- Access Control ---

allowlist:
  # OpenClaw uses dot notation (chat.send) on the wire
  - chat.send
  - chat.stream
  - chat.cancel
  - tools.invoke
  - tools.list
  - agents.list
  - resources.list
  - resources.read
  - session.list
  - session.load
  - session.create
  # Also allow slash notation for compatibility
  - chat/send
  - chat/stream
  - tools/invoke
  - tools/list
  - agents/list
  - resources/list
  - resources/read

denylist:
  - shell.exec
  - system.raw
  - file.write
  - file.delete
  - db.query
  - db.raw_query
  - web.fetch
  - process.exec
  - os.exec
  - eval

# --- Argument Filters (secrets + PII redaction) ---

arg_filters:
  - tool: "chat.send"
    regex: "(api_key|password|token|secret|aws_access_key|private_key)[^\\w]*[=:]?\\s*['\"]?[a-zA-Z0-9/+._-]{20,}['\"]?"
  - tool: "chat.stream"
    regex: "(api_key|password|token|secret|aws_access_key|private_key)[^\\w]*[=:]?\\s*['\"]?[a-zA-Z0-9/+._-]{20,}['\"]?"
  - tool: "tools.invoke"
    regex: "(api_key|password|token|secret|aws_access_key|private_key)[^\\w]*[=:]?\\s*['\"]?[a-zA-Z0-9/+._-]{20,}['\"]?"
  - tool: "chat.send"
    regex: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
  - tool: "chat.stream"
    regex: "\\b\\d{3}-\\d{2}-\\d{4}\\b"

# No domain allowlist — no outbound web access allowed

# --- Vulnerability Scanner ---

vuln_scan:
  enabled: true
  rules:
    - sqli
    - ssrf
    - path_traversal
    - command_injection
    - xss

# --- Prompt Injection Scanner ---

prompt_injection:
  enabled: true
  scan_requests: true
  scan_responses: true
  canary_tokens: true
  sensitivity: high
  trusted_response_tools:
    - "tools/list"
    - "resources/list"
    - "agents/list"

# --- Malware Scanner ---

malware_scan:
  enabled: true
  checks:
    - magic_bytes
    - entropy
    - signatures
    - archive_safety
    - script_detection
  entropy_threshold: 6.5
  max_decoded_size: 10485760

# --- OpenClaw-Specific ---

openclaw:
  gateway_port: 18790
  proxy_listen: ":18789"
  auth_token: "env"

  agent_allowlist:
    - friday
    - pepper
    - nimbus
    - sentinel
    - coda

  channel_policies: {}
