# OpenClaw Studio — TLS virtual host
# WebSocket + Next.js reverse proxy behind access gate

# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name studio.example.com;

    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name studio.example.com;

    # --- TLS (shared cert with clawshield.example.com) ---
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Docker DNS for runtime upstream resolution
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # --- Security Headers ---
    # No CSP — Next.js uses inline scripts/styles
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Request-ID $request_id always;

    # --- Rate Limiting ---
    limit_req zone=per_ip burst=20 nodelay;
    limit_conn per_ip_conn 10;

    # --- Block suspicious paths ---
    location ~ /\. {
        return 444;
    }
    location ~* ^/(admin|wp-admin|wp-login|phpmyadmin|phpMyAdmin|myadmin|pma|cgi-bin|actuator) {
        return 444;
    }

    # --- WebSocket endpoint (gateway proxy) ---
    location /api/gateway/ws {
        limit_conn per_ip_conn 3;

        set $studio_upstream http://studio:3000;
        proxy_pass $studio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # --- Next.js static assets (immutable cache) ---
    location /_next/static/ {
        set $studio_upstream http://studio:3000;
        proxy_pass $studio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Everything else (pages, API routes) ---
    location / {
        set $studio_upstream http://studio:3000;
        proxy_pass $studio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }
}
