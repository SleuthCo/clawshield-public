# Catch-all default server — reject direct IP access
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    return 444;
}

# Health check endpoint (internal only, no TLS needed)
server {
    listen 80;
    server_name 127.0.0.1;

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 444;
    }
}

# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name clawshield.example.com;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
        default_type text/plain;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server — production
server {
    listen 443 ssl http2;
    server_name clawshield.example.com;

    # --- TLS Configuration ---
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Request-ID $request_id always;

    # --- Rate Limiting ---
    limit_req zone=per_ip burst=20 nodelay;
    limit_req zone=global burst=50 nodelay;
    limit_conn per_ip_conn 10;

    # --- Block suspicious paths ---
    location ~ /\. {
        # Block .env, .git, .htaccess, etc.
        return 444;
    }
    location ~* ^/(admin|wp-admin|wp-login|phpmyadmin|phpMyAdmin|myadmin|pma|cgi-bin|actuator) {
        return 444;
    }
    location ~* \.\. {
        # Block path traversal attempts
        return 444;
    }

    # --- WebSocket endpoint (open to clients) ---
    location /ws {
        limit_conn per_ip_conn 3;
        limit_req zone=per_ip burst=5 nodelay;

        proxy_pass http://clawshield_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # WebSocket buffer limits
        proxy_buffering off;
    }

    # --- REST API (Bearer token auth, no IP restriction) ---
    location /v1/ {
        limit_req zone=per_ip burst=5 nodelay;

        proxy_pass http://clawshield_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # --- Control UI + API (admin IP only) ---
    location / {
        # Only allow admin access — everyone else gets dropped
        allow YOUR_IP_HERE;
        deny all;

        proxy_pass http://clawshield_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }
}
