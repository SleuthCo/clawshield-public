user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept on;
}

http {
    # Hide server version
    server_tokens off;

    # MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Forensic log format
    log_format forensic '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct=$upstream_connect_time '
                        'uht=$upstream_header_time urt=$upstream_response_time '
                        'ssl=$ssl_protocol/$ssl_cipher '
                        'rid=$request_id';

    access_log /var/log/nginx/access.log forensic;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=10r/s;
    limit_req_zone $server_name zone=global:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

    # Timeouts
    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          30s;
    keepalive_timeout     65s;

    # Buffer limits
    client_max_body_size       1m;
    client_body_buffer_size    16k;
    client_header_buffer_size  1k;
    large_client_header_buffers 4 8k;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    gzip            off;  # No compression — API/WebSocket only

    # Upstreams
    upstream clawshield_backend {
        server clawshield:18789;
        keepalive 16;
    }

    # studio_backend resolved at request-time via variables in studio.conf
    # (avoids nginx startup failure when studio container is not yet running)

    # Map for WebSocket upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/conf.d/*.conf;
}
