# Sentinel eBPF Security Monitor Configuration

# Detection modules to enable
detectors:
  process_execution: true
  network_connections: true
  file_access: true
  privilege_escalation: true
  suspicious_syscalls: true

# Alert destinations
alerts:
  telegram:
    enabled: true
    # Uses SENTINEL_BOT_TOKEN from environment
  log_file: /var/log/sentinel-ebpf.log
  console: true

# Thresholds and tuning
thresholds:
  # Alert if more than N failed SSH attempts in 60 seconds
  ssh_brute_force: 5
  # Alert if process spawns more than N children rapidly
  fork_bomb_threshold: 50
  # Network scan detection (connections to different ports)
  port_scan_threshold: 20

# Allowlists (won't trigger alerts)
allowlist:
  processes:
    - /usr/bin/apt
    - /usr/bin/dpkg
    - /usr/lib/systemd/systemd
    - /usr/bin/node
    - /usr/bin/python3

  network:
    # Local development ports
    - "127.0.0.1:*"
    - "172.26.176.1:1234"  # LM Studio

  users:
    - root  # For system operations
    - lan   # Primary user

# Suspicious patterns
suspicious:
  commands:
    - "curl.*|.*sh"        # Pipe curl to shell
    - "wget.*|.*sh"
    - "nc -e"              # Netcat reverse shell
    - "bash -i"            # Interactive bash (potential reverse shell)
    - "/dev/tcp/"          # Bash TCP device
    - "base64 -d"          # Decode and execute
    - "chmod.*777"         # Overly permissive
    - "rm -rf /"           # Destructive command

  files:
    - /etc/passwd
    - /etc/shadow
    - /etc/sudoers
    - ~/.ssh/authorized_keys
    - /proc/*/mem

  network:
    # Known malicious ports
    - 4444   # Metasploit default
    - 5555   # Common backdoor
    - 31337  # Elite/leet port
